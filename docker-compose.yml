services:
  postgres:
    image: postgres:16-alpine
    container_name: webmais-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webmais
      POSTGRES_PASSWORD: webmais
      POSTGRES_DB: webmais_contratos
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmais -d webmais_contratos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: webmais-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg-data:
