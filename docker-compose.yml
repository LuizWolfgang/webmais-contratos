services:
  postgres:
    image: postgres:16-alpine
    container_name: webmais-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webmais
      POSTGRES_PASSWORD: webmais
      POSTGRES_DB: webmais_contratos
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmais -d webmais_contratos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: webmais-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.3.1
    container_name: webmais-kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: TZjwpgrGQWm1_rjYMHet_w
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: webmais-kafka-ui
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: webmais
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  api:
    build: ./backend
    container_name: webmais-api
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      JWT_EXPIRES_IN: 8h
      DATABASE_URL: postgresql://webmais:webmais@postgres:5432/webmais_contratos?schema=public
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 60
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: webmais-contratos
      KAFKA_TOPIC_CONTRACTS_EXPIRED: contracts.expired
      KAFKA_CONSUMER_GROUP: contracts-expiration-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: webmais-worker
    restart: unless-stopped
    profiles: ["full"]
    command: ["node", "dist/worker.main.js"]
    environment:
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      DATABASE_URL: postgresql://webmais:webmais@postgres:5432/webmais_contratos?schema=public
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 60
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: webmais-contratos
      KAFKA_TOPIC_CONTRACTS_EXPIRED: contracts.expired
      KAFKA_CONSUMER_GROUP: contracts-expiration-worker
      EXPIRATION_SCHEDULER_INTERVAL_MS: 15000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    container_name: webmais-web
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  pg-data:
  kafka-data:
